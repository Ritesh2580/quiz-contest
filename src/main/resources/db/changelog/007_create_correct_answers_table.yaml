databaseChangeLog:
  - changeSet:
      id: 007-create-correct-answers-table
      author: system
      context: dev
      changes:
        - createTable:
            tableName: correct_answers
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: question_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_correct_answers_question_id
                    references: questions(id)
              - column:
                  name: answer_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: answer_value
                  type: VARCHAR(500)
              - column:
                  name: is_case_sensitive
                  type: BOOLEAN
                  defaultValue: false
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: INTEGER
                  defaultValue: 1
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_correct_answers_question_id
            tableName: correct_answers
            columns:
              - column:
                  name: question_id