databaseChangeLog:
  - changeSet:
      id: 003-create-quizzes-table
      author: system
      context: dev
      changes:
        - createTable:
            tableName: quizzes
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: creator_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_quizzes_creator_id
                    references: users(id)
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(4000)
              - column:
                  name: banner_image_id
                  type: UUID
              - column:
                  name: start_datetime
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: end_datetime
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: duration_minutes
                  type: INTEGER
              - column:
                  name: is_published
                  type: BOOLEAN
                  defaultValue: false
                  constraints:
                    nullable: false
              - column:
                  name: total_points
                  type: INTEGER
                  defaultValue: 0
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: INTEGER
                  defaultValue: 1
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_quizzes_creator_id
            tableName: quizzes
            columns:
              - column:
                  name: creator_id
        - createIndex:
            indexName: idx_quizzes_start_datetime
            tableName: quizzes
            columns:
              - column:
                  name: start_datetime
        - createIndex:
            indexName: idx_quizzes_end_datetime
            tableName: quizzes
            columns:
              - column:
                  name: end_datetime
        - createIndex:
            indexName: idx_quizzes_banner_image_id
            tableName: quizzes
            columns:
              - column:
                  name: banner_image_id