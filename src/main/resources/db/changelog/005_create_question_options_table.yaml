databaseChangeLog:
  - changeSet:
      id: 005-create-question-options-table
      author: system
      context: dev
      changes:
        - createTable:
            tableName: question_options
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: question_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_question_options_question_id
                    references: questions(id)
              - column:
                  name: option_text
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: option_image_id
                  type: UUID
              - column:
                  name: option_index
                  type: SMALLINT
                  constraints:
                    nullable: false
              - column:
                  name: is_correct
                  type: BOOLEAN
                  defaultValue: false
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: INTEGER
                  defaultValue: 1
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_question_options_question_id
            tableName: question_options
            columns:
              - column:
                  name: question_id
        - createIndex:
            indexName: idx_question_options_image_id
            tableName: question_options
            columns:
              - column:
                  name: option_image_id
        - addUniqueConstraint:
            columnNames: question_id,option_index
            constraintName: uk_question_options_unique
            tableName: question_options